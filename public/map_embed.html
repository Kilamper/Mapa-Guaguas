<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body, html, #map { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #aadaff; }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div id="map"></div>
  <script>
    // Initialize Leaflet map with zoom snap disabled so it fits exactly to our bounding box
    const map = L.map('map', {
      zoomControl: false,
      attributionControl: false,
      zoomSnap: 0, // Fractional zoom allows perfect bounding box matching!
      boxZoom: false,
      doubleClickZoom: false,
      dragging: false,
      keyboard: false,
      scrollWheelZoom: false,
      touchZoom: false
    });
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Bounding Box values identical to your export coordinates
    const minlat = 27.898562920006924;
    const minlon = -15.979614257812502;
    const maxlat = 28.25782008117972;
    const maxlon = -15.218811035156252;
    
    const bounds = L.latLngBounds([minlat, minlon], [maxlat, maxlon]);
    
    // Fit perfectly with NO padding
    map.fitBounds(bounds, { animate: false, padding: [0, 0] });
  </script>
</body>
</html>
